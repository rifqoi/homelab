apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: ">=0.41.0" # pin to a range or exact version as needed
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 12h
  # ── OIDC credentials come from an existing Secret ────────────────────────
  # The Secret must exist before HelmRelease reconciles.
  # See "headlamp-oidc-secret.yaml" below for the Secret spec.
  valuesFrom:
    - kind: Secret
      name: headlamp-oidc-secret
      valuesKey: oidc-client-id # key inside the Secret
      targetPath: config.oidc.clientID
    - kind: Secret
      name: headlamp-oidc-secret
      valuesKey: oidc-client-secret
      targetPath: config.oidc.clientSecret
  values:
    replicaCount: 1
    # ── Headlamp application config ─────────────────────────────────────────
    config:
      # Base URL must match what your IdP callback expects
      baseURL: "https://headlamp.rifqoi.com"
      oidc:
        # clientID and clientSecret are injected via valuesFrom above
        issuerURL: "https://headlamp.rifqoi.com" # replace with your IdP
        scopes: "openid,email,groups"
    # ── Ingress with TLS via cert-manager ───────────────────────────────────
    ingress:
      enabled: true
      ingressClassName: "cilium" # adjust to your ingress controller class
      annotations:
        # cert-manager will issue/renew the certificate automatically
        cert-manager.io/cluster-issuer: "letsencrypt-prod" # or your issuer name
      hosts:
        - host: headlamp.rifqoi.com
          paths:
            - path: /
              type: Prefix
      tls:
        - secretName: rifqoi-com-tls # cert-manager will create/manage this
          hosts:
            - headlamp.rifqoi.com
    # ── Service account for in-cluster access ────────────────────────────────
    # If you want Headlamp to use a ServiceAccount with ClusterRole, set:
    clusterRoleBinding:
      create: true
    serviceAccount:
      create: true
      name: headlamp
    # ── Resources (tune as needed) ───────────────────────────────────────────
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
