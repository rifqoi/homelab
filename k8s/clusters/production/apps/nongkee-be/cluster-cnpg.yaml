apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nongkee-be-pg
spec:
  instances: 1
  storage:
    size: 5Gi
    storageClass: zfs-iscsi
  # Bootstrap DB
  bootstrap:
    initdb:
      database: nongkee
      owner: nongkee
      secret:
        name: nongkee-be-pg-user
      dataChecksums: true
      encoding: UTF8
      localeCollate: C
      localeCType: C
  resources:
    requests:
      memory: "512Mi"
      cpu: "150m"
    limits:
      memory: "1Gi"
      cpu: "300m"
  # ── Monitoring ─────────────────────────────────────────────────
  monitoring:
    enablePodMonitor: false # set true if Prometheus operator installed
