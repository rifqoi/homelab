apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
  namespace: immich
spec:
  instances: 2
  # ── PostgreSQL version ─────────────────────────────────────────
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.3
  # ── Storage ────────────────────────────────────────────────────
  storage:
    size: 20Gi
    storageClass: zfs-iscsi
  # ── Bootstrap ──────────────────────────────────────────────────
  # Creates the initial database and user for Immich
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-pg-user
      dataChecksums: true
      encoding: UTF8
      localeCollate: C
      localeCType: C
      postInitApplicationSQL:
        - ALTER USER immich WITH SUPERUSER;
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
        - CREATE EXTENSION IF NOT EXISTS cube;
        - CREATE EXTENSION IF NOT EXISTS earthdistance;
  # ── PostgreSQL config ──────────────────────────────────────────
  postgresql:
    parameters:
      # Memory tuning (adjust based on your node size)
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "16MB"
      maintenance_work_mem: "64MB"
      # Connection tuning
      max_connections: "100"
      # WAL settings
      wal_level: "replica"
      max_wal_size: "1GB"
      min_wal_size: "80MB"
    # Allow immich user to connect
    pg_hba:
      - host immich immich all md5
    shared_preload_libraries:
      - "vchord.so" # VectorChord (replaces vectors.so)
  # ── Superuser ──────────────────────────────────────────────────
  enableSuperuserAccess: false
  # ── Resources ──────────────────────────────────────────────────
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  # ── Monitoring ─────────────────────────────────────────────────
  monitoring:
    enablePodMonitor: false # set true if Prometheus operator installed
