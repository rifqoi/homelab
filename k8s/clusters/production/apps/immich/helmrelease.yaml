apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: immich
  dependsOn:
    - name: cloudnative-pg
  chartRef:
    kind: OCIRepository
    name: immich
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # ── Shared across ALL components ───────────────────────────────
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.7.5 # pin your Immich version here
            env:
              TZ: "Asia/Jakarta"
              # Redis — points to bundled valkey
              REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
              # Machine learning URL
              IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
              # Database — CloudNativePG service + secret
              DB_HOSTNAME: immich-pg-rw
              DB_PORT: "5432"
              DB_DATABASE_NAME: immich
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-pg-user
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-pg-user
                    key: password
    # ── Immich specific ────────────────────────────────────────────
    immich:
      persistence:
        library:
          existingClaim: immich-library
      metrics:
        enabled: false
      configuration: {}
    # ── Valkey (bundled Redis) ─────────────────────────────────────
    valkey:
      enabled: true
      persistence:
        data:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 1Gi
    # ── Server ────────────────────────────────────────────────────
    server:
      service:
        main:
          annotations:
            announce: "true"
      ingress:
        main:
          enabled: true
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            announce: "true"
          className: cilium
          hosts:
            - host: immich.rifqoi.com
              paths:
                - path: /
                  pathType: Prefix
              tls:
                - secretName: rifqoi-com-tls
                  hosts:
                    - immich.rifqoi.com
    # ── Machine Learning ──────────────────────────────────────────
    machine-learning:
      controllers:
        main:
          replicas: 1
      enabled: true
      persistence:
        cache:
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 10Gi
