apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: immich
  dependsOn:
    - name: cloudnative-pg # operator must be ready
  chartRef:
    kind: OCIRepository
    name: immich
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    # ── Immich version ─────────────────────────────────────────────
    # Must be set explicitly — chart does NOT auto-update with releases
    image:
      tag: v1.132.3 # pin to a specific Immich release
    # ── Shared env (applied to ALL components) ─────────────────────
    env:
      TZ: "Asia/Jakarta"
      # Database — point to CloudNativePG service
      DB_HOSTNAME: immich-pg-rw.immich.svc
      DB_PORT: "5432"
      DB_DATABASE_NAME: immich
      DB_USERNAME:
        valueFrom:
          secretKeyRef:
            name: immich-pg-app
            key: username
      DB_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: immich-pg-app
            key: password
      # Redis — use bundled valkey (auto-configured)
      REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
      # Machine learning URL (auto-configured)
      IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
    # ── Immich-specific config ──────────────────────────────────────
    immich:
      persistence:
        library:
          existingClaim: immich-library # the PVC you created above
      metrics:
        enabled: false # set true if Prometheus operator installed
      configuration: {} # use Immich web UI for app config (recommended)
    # ── Valkey (Redis-compatible, bundled) ──────────────────────────
    valkey:
      enabled: true
      persistence:
        enabled: true # persist job queues across restarts
        size: 1Gi
    # ── Server ─────────────────────────────────────────────────────
    server:
      enabled: true
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
      ingress:
        main:
          enabled: true
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "0" # required for large uploads
            announce: "true"
          hosts:
            - host: immich.rifqoi.com
              paths:
                - path: /
                  pathType: Prefix
                  # tls:
                  #   - secretName: immich-tls
                  #     hosts:
                  #       - immich.rifqoi.com
    # ── Machine Learning ───────────────────────────────────────────
    machine-learning:
      enabled: true
      resources:
        requests:
          memory: "1Gi"
          cpu: "100m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
      persistence:
        cache:
          enabled: true # persist ML models — avoids re-download on restart
          size: 10Gi
          type: pvc
          accessMode: ReadWriteOnce
