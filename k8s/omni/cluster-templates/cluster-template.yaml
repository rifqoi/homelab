# omnictl cluster template sync -v -f cluster-template.yaml
kind: Cluster
name: talos-prod-cluster
labels:
  cluster-id: "1"
kubernetes:
  version: v1.35.0
talos:
  version: v1.12.1
patches:
  - name: disable-default-cni
    inline:
      cluster:
        network:
          cni:
            name: none
        proxy:
          disabled: true
  - name: dns-config
    inline:
      machine:
        network:
          nameservers:
            - 192.168.31.11
  - name: oidc-apiserver
    inline:
      cluster:
        apiServer:
          extraArgs:
            oidc-issuer-url: "https://pocket.rifqoi.com"   
            oidc-client-id: "38e8d760-55ba-4bed-beea-4118489685f2"
            oidc-username-claim: "email"
            oidc-groups-claim: "groups"
            oidc-groups-prefix: "oidc:"
---
kind: ControlPlane
machineClass:
  name: libvirt-controlplane
  size: 1
systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/util-linux-tools
  - siderolabs/iscsi-tools
patches:
  - name: controlplane-static-ip
    inline:
      machine:
        network:
          interfaces:
            - deviceSelector:
                busPath: "0*"
              addresses:
                - 192.168.31.200/24
              routes:
                - network: 0.0.0.0/0
                  gateway: 192.168.31.1
              dhcp: false
---
kind: Workers
name: workers
machineClass:
  name: libvirt-worker
  size: 4
systemExtensions:
  - siderolabs/qemu-guest-agent
  - siderolabs/util-linux-tools
  - siderolabs/iscsi-tools
patches:

