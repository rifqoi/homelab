# yaml-language-server: $schema=https://json.schemastore.org/helmfile.json
repositories:
  - name: cilium
    url: https://helm.cilium.io/
  - name: controlplaneio-fluxcd
    url: ghcr.io/controlplaneio-fluxcd/charts
    oci: true

releases:
  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: 1.18.0
    values:
      - ./values/cilium.values.yaml
  - name: flux-operator
    namespace: flux-system
    installed: false
    chart: controlplaneio-fluxcd/flux-operator
    values:
      - ./values/flux-operator.values.yaml

